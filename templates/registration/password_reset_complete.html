{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Study Admin | Contraseña Cambiada</title>

  <!-- Google Font: Source Sans Pro -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="{% static 'plugins/fontawesome-free/css/all.min.css' %}">
  <!-- Theme style -->
  <link rel="stylesheet" href="{% static 'dist/css/adminlte.min.css' %}">
</head>
<body class="hold-transition login-page">
<div class="login-box">
  <div class="login-logo">
    <a href="#"><b>Study</b>App</a>
  </div>
  <div class="card">
    <div class="card-body login-card-body text-center">
      <div class="mb-3">
        <i class="fas fa-check-circle text-success" style="font-size: 3rem;"></i>
      </div>
      <p class="login-box-msg font-weight-bold">¡Contraseña restablecida!</p>
      
      <p>Tu contraseña se ha establecido correctamente. Ya puedes iniciar sesión con tu nueva contraseña.</p>

      <p class="mt-3 mb-1">
        <a href="{% url 'login' %}" class="btn btn-primary btn-block">Ir a Iniciar Sesión</a>
      </p>
    </div>
  </div>
</div>

<!-- jQuery -->
<script src="{% static 'plugins/jquery/jquery.min.js' %}"></script>
<!-- Bootstrap 4 -->
<script src="{% static 'plugins/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
<!-- AdminLTE App -->
<script src="{% static 'dist/js/adminlte.min.js' %}"></script>
</body>
</html>
